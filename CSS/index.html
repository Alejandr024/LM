<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora Básica</h1>
    <div id="calculadora">
        <div id="pantalla">
            <p id="resultado">0.0</p>
        </div>
        <div id="numbers">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button id="masmenos">+<br>-</button>
            <button id="cero">0</button>
            <button id="punto">.</button>
        </div>
        <div id="operaciones">
            <button>+</button>
            <button id="borrado">C</button>
            <button>-</button>
            <button>/</button>
            <button id="igual">=</button>
            <button>x</button>
        </div>
    </div>
</body>
</html>
