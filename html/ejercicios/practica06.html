<!--¿Has leído a Ángel González? Es un poeta sorprendente. Haz
una página con su poema "Eso era amor". Respeta el formato, agrega el título al
comienzo. Al final de la página y justificado a la derecha coloca el nombre del
autor.-->
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Práctica 06</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <h1>Eso era amor</h1>
            <p>Le comenté: <br>
            -Me entusiasman tus ojos. Y ella dijo: <br>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;-¿Te gustan solos o con rimel? <br>
            -Grandes,<br>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;respondí sin dudar. <br>
            Y también sin dudar <br>
            me los dejó en un plato y se fue a tientas.
        </p>

        <blockquote align   ="right">
            Ángel González
        </blockquote>
    </body>
</html>
